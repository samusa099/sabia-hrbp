name: Validate project

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python requirements
        run: python -m pip install -r 07_Python/requirements.txt

      - name: Run raw-data cleaning workflow
        run: python 07_Python/clean_and_validate.py

      - name: Rebuild SQLite database
        run: python 13_Database_SQL/00_build_database.py

      - name: Validate repository
        run: python scripts/validate_project.py
